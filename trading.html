<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTrading - PC 대시보드</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="h-14 bg-slate-800 border-b border-slate-700 flex items-center px-6 shrink-0">
    <button id="sidebarToggle" type="button" class="sidebar-toggle-button" aria-label="좌측 메뉴 접기" aria-expanded="true">
        <i class="fa-solid fa-bars" aria-hidden="true"></i>
    </button>
    <a href="index.html" class="w-64 flex items-center space-x-2 shrink-0 hover:opacity-90 transition-opacity" aria-label="AutoTrading 홈으로 이동">
        <div class="w-9 h-8 bg-emerald-500 rounded flex items-center justify-center text-slate-900 font-bold text-sm tracking-tight">AT</div>
        <span class="font-bold text-xl tracking-tight text-white">AutoTrading <span class="text-xs text-emerald-400 ml-1 border border-emerald-400 px-1 py-0.5 rounded">BETA</span></span>
    </a>
    
    <div class="relative flex-1 max-w-sm mx-4">
        <input id="searchBar" type="text" placeholder="종목명 또는 종목코드를 입력하세요" 
               class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 pr-10 text-sm text-white focus:outline-none focus:border-emerald-500">
        <button id="searchClearButton" type="button" class="search-clear-button" aria-label="검색어 지우기" title="검색어 지우기">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
        
        <div id="searchModal" class="search-modal">
            <p class="text-xs text-slate-400 mb-2 font-bold">검색 결과</p>
            <div id="searchResults" class="search-results">
                <div class="search-empty">종목명 또는 종목코드를 입력하세요.</div>
            </div>
            <div class="mb-4">
                <p class="text-xs text-slate-400 mb-2 font-bold">최근 검색</p>
                <div class="flex flex-wrap gap-2">
                    <span class="px-3 py-1 bg-slate-700 rounded-full text-xs text-slate-300">KODEX 미국S&P500</span>
                    <span class="px-3 py-1 bg-slate-700 rounded-full text-xs text-slate-300">QQQ</span>
                </div>
            </div>
            <div class="mb-4">
                <p class="text-xs text-slate-400 mb-2 font-bold">인기 검색</p>
                <div class="space-y-1">
                    <div class="flex justify-between text-sm text-slate-300"><span>1 삼성전자</span><span class="text-blue-500">-0.92%</span></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="flex items-center space-x-6 ml-auto">
        <button id="profileBtn" type="button" class="login-trigger" aria-haspopup="dialog" aria-controls="authModal">
            <i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i>
            <span>로그인</span>
        </button>
    </div>
</header>

    <div id="authModal" class="auth-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
        <div class="auth-modal-card">
            <button id="authModalClose" type="button" class="auth-modal-close" aria-label="로그인 창 닫기">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
            <div class="auth-modal-icon">
                <i class="fa-solid fa-user-lock" aria-hidden="true"></i>
            </div>
            <h2 id="authModalTitle">로그인</h2>
            <form class="auth-login-form" data-auth-panel="login">
                <label class="auth-field">
                    <span>아이디</span>
                    <input type="text" name="loginId" autocomplete="username" placeholder="아이디를 입력하세요">
                </label>
                <label class="auth-field">
                    <span>패스워드</span>
                    <input type="password" name="password" autocomplete="current-password" placeholder="패스워드를 입력하세요">
                </label>
                <button type="submit" class="auth-submit-button">로그인</button>
                <p class="auth-switch-text">
                    <button id="authSignupLink" type="button">회원가입</button>
                </p>
            </form>
            <form class="auth-login-form hidden" data-auth-panel="signup">
                <label class="auth-field">
                    <span>아이디</span>
                    <input type="text" name="signupId" autocomplete="username" placeholder="아이디를 입력하세요">
                </label>
                <label class="auth-field">
                    <span>패스워드</span>
                    <input type="password" name="signupPassword" autocomplete="new-password" placeholder="패스워드를 입력하세요">
                </label>
                <label class="auth-field">
                    <span>닉네임</span>
                    <input type="text" name="nickname" autocomplete="nickname" placeholder="닉네임을 입력하세요">
                </label>
                <button type="submit" class="auth-submit-button">회원가입</button>
                <p class="auth-switch-text">
                    <span>이미 계정이 있나요?</span>
                    <button id="authLoginLink" type="button">로그인</button>
                </p>
            </form>
        </div>
    </div>

    <div class="app-content flex flex-1 overflow-hidden">
       
        <aside id="appSidebar" class="app-sidebar w-16 md:w-64 bg-slate-800 border-r border-slate-700 flex flex-col justify-between shrink-0 transition-all duration-300">
            <nav class="p-4 space-y-2">
                <a href="#" class="flex items-center space-x-3 text-emerald-400 bg-slate-700/50 p-3 rounded-lg transition-colors">
                    <i class="fa-solid fa-chart-line text-lg w-6 text-center"></i>
                    <span class="font-medium hidden md:block">트레이딩 대시보드</span>
                </a>
                <a href="strategy.html" class="flex items-center space-x-3 text-slate-400 hover:text-white hover:bg-slate-700 p-3 rounded-lg transition-colors">
                    <i class="fa-solid fa-diagram-project text-lg w-6 text-center"></i>
                    <span class="font-medium hidden md:block">전략 설정</span>
                </a>
                <a href="news.html" class="flex items-center space-x-3 text-slate-400 hover:text-white hover:bg-slate-700 p-3 rounded-lg transition-colors">
                    <i class="fa-solid fa-newspaper text-lg w-6 text-center"></i>
                    <span class="font-medium hidden md:block">뉴스</span>
                </a>
                <a href="asset.html" class="sidebar-nav-link flex items-center space-x-3 text-slate-400 hover:text-white hover:bg-slate-700 p-3 rounded-lg transition-colors">
                    <i class="fa-solid fa-wallet text-lg w-6 text-center"></i>
                    <span class="font-medium hidden md:block">자산 현황</span>
                </a>
                <a href="#" class="flex items-center space-x-3 text-slate-400 hover:text-white hover:bg-slate-700 p-3 rounded-lg transition-colors">
                    <i class="fa-solid fa-clock-rotate-left text-lg w-6 text-center"></i>
                    <span class="font-medium hidden md:block">매매 이력</span>
                </a>
            </nav>
            <div class="p-4">
                <a href="#" class="flex items-center space-x-3 text-slate-400 hover:text-white p-3 transition-colors">
                    <i class="fa-solid fa-gear text-lg w-6 text-center"></i>
                    <span class="font-medium hidden md:block">시스템 설정</span>
                </a>
            </div>
        </aside>

        <main class="app-main flex-1 overflow-hidden">
            <div class="main_m">
           
            <section class="main_a">
                <div>
                    <h1 class="text-2xl font-bold flex items-center space-x-2">
                        <span id="stockName">-</span>
                        <span id="stockCode" class="text-sm font-normal text-slate-400 border border-slate-600 px-2 py-0.5 rounded">-</span>
                        <span id="serverConnectionStatus" class="server-connection-status is-disconnected">
                            <span class="server-connection-dot" aria-hidden="true"></span>
                            <span id="serverConnectionText">정규장종료</span>
                        </span>
                    </h1>
                    <div class="main_quote_row">
                        <span id="stockPrice" class="text-3xl font-bold text-slate-300">-</span>
                        <span id="stockChange" class="text-lg font-medium text-slate-300">-</span>
                    </div>
                </div>
                <div class="main_quote_metrics">
                    <div class="flex flex-col"><span class="text-slate-400">고가</span><span id="stockHigh" class="text-slate-300">-</span></div>
                    <div class="flex flex-col"><span class="text-slate-400">저가</span><span id="stockLow" class="text-slate-300">-</span></div>
                    <div class="flex flex-col"><span class="text-slate-400">거래량</span><span id="stockVolume">-</span></div>
                </div>
            </section>

            <section class="main_b panel">
                <div class="h-10 border-b border-slate-700 flex items-center px-4 space-x-4 text-sm shrink-0">
                    <button class="chart-interval-btn text-slate-400 hover:text-white py-2" data-interval="1">1분</button>
                    <button class="chart-interval-btn text-slate-400 hover:text-white py-2" data-interval="5">5분</button>
                    <button class="chart-interval-btn text-emerald-400 font-medium border-b-2 border-emerald-400 py-2" data-interval="15">15분</button>
                    <button class="chart-interval-btn text-slate-400 hover:text-white py-2" data-interval="30">30분</button>
                    <button class="chart-interval-btn text-slate-400 hover:text-white py-2" data-interval="60">1시간</button>
                    <button class="chart-interval-btn text-slate-400 hover:text-white py-2" data-interval="120">2시간</button>
                    <button class="chart-interval-btn text-slate-400 hover:text-white py-2" data-interval="day">일봉</button>
                    <button class="chart-interval-btn text-slate-400 hover:text-white py-2" data-interval="week">주봉</button>
                    <button class="chart-interval-btn text-slate-400 hover:text-white py-2" data-interval="month">월봉</button>
                    <div class="flex-1"></div>
                    <button class="text-slate-400 hover:text-white"><i class="fa-solid fa-expand"></i></button>
                </div>
               
                <div class="chart_area">
                    <canvas id="stockChart"></canvas>
                    <div class="chart-zoom-controls" aria-label="차트 확대 축소">
                        <button id="chartZoomIn" type="button" title="차트 확대">+</button>
                        <button id="chartZoomOut" type="button" title="차트 축소">-</button>
                    </div>
                    <div id="chartStatus" class="chart-status">종목을 검색하면 차트가 표시됩니다.</div>
                </div>
                    
            </section>
            </div>

        </main>

        <aside class="indicator-sidebar flex flex-col p-4 pl-0 space-y-4 shrink-0 overflow-y-auto">
           
            <div class="panel flex flex-col flex-1 min-h-0">
                <div class="right-panel-tabs" role="tablist" aria-label="우측 패널 선택">
                    <button id="orderPanelTab" type="button" class="right-panel-tab is-active" data-panel-tab="order"
                        role="tab" aria-selected="true" aria-controls="orderPanel">주문</button>
                    <button id="indicatorPanelTab" type="button" class="right-panel-tab" data-panel-tab="indicator"
                        role="tab" aria-selected="false" aria-controls="indicatorPanel">지표 설정</button>
                </div>
               
                <div id="indicatorPanel" class="indicator-strategy-body hidden" role="tabpanel" aria-labelledby="indicatorPanelTab">
                    <div class="indicator-strategy-toolbar">
                        <span class="indicator-section-title">지표 설정</span>
                        <select id="savedStrategySelect" class="indicator-preset-select" aria-label="저장한 지표 설정 불러오기">
                            <option value="">저장한 전략 불러오기</option>
                        </select>
                    </div>

                    <div class="indicator-strategy-divider"></div>

                    <div class="indicator-name-field">
                        <label for="strategyNameInput">전략 이름</label>
                        <input id="strategyNameInput" type="text" placeholder="전략 이름을 입력하세요">
                        <p id="strategyNameMessage" class="indicator-message" aria-live="polite"></p>
                    </div>

                    <div class="indicator-search-wrap">
                        <div class="indicator-search-box">
                            <input id="indicatorSearchInput" type="text" placeholder="보조지표 검색" class="indicator-search-input"
                                autocomplete="off">
                            <div id="indicatorSearchDropdown" class="indicator-search-dropdown hidden"></div>
                        </div>
                        <button id="indicatorAddButton" type="button" class="indicator-add-button">추가</button>
                    </div>

                    <div id="indicatorCards" class="indicator-card-list"></div>

                    <div class="indicator-strategy-actions">
                        <button id="indicatorResetButton" type="button" class="indicator-reset-button">초기화</button>
                        <button id="indicatorDeleteButton" type="button" class="indicator-delete-button">삭제</button>
                        <button id="indicatorSaveButton" type="button" class="indicator-save-button">저장</button>
                    </div>
                </div>

                <div id="orderPanel" class="order-panel-body hidden" role="tabpanel" aria-labelledby="orderPanelTab">
                    <div class="order-top-tabs" aria-label="주문 방식">
                        <button type="button" class="order-top-tab is-active">일반주문</button>
                    </div>

                    <form id="orderForm" class="order-form">
                        <div class="order-side-tabs" aria-label="매매 구분">
                            <button type="button" class="order-side-tab is-active" data-order-action="buy">매수</button>
                            <button type="button" class="order-side-tab" data-order-action="sell">매도</button>
                            <button type="button" class="order-side-tab" data-order-action="pending">미체결</button>
                        </div>

                        <label class="order-field order-field-select order-trade-section">
                            <span>주문 유형</span>
                            <select id="orderTypeSelect">
                                <option value="regular">정규장 주문</option>
                            </select>
                        </label>

                        <div class="order-field order-trade-section">
                            <span>주문 가격</span>
                            <div class="order-price-tabs" aria-label="가격 유형">
                                <button type="button" class="order-price-tab is-active" data-price-mode="limit">지정가</button>
                                <button type="button" class="order-price-tab" data-price-mode="market">시장가</button>
                            </div>
                        </div>

                        <div class="order-control-row order-trade-section">
                            <span></span>
                            <div class="order-stepper">
                                <input id="orderPriceInput" type="text" inputmode="numeric" autocomplete="off" placeholder="가격 입력">
                                <span class="order-unit">원</span>
                                <button type="button" class="order-price-step-button" data-step-target="price" data-step="-1" aria-label="가격 감소">-</button>
                                <button type="button" class="order-price-step-button" data-step-target="price" data-step="1" aria-label="가격 증가">+</button>
                            </div>
                        </div>

                        <div class="order-control-row order-trade-section">
                            <label for="orderQuantityInput">수량</label>
                            <div class="order-stepper">
                                <input id="orderQuantityInput" type="text" inputmode="numeric" autocomplete="off" placeholder="수량 입력">
                                <span class="order-unit">주</span>
                                <button type="button" data-step-target="quantity" data-step="-1" aria-label="수량 감소">-</button>
                                <button type="button" data-step-target="quantity" data-step="1" aria-label="수량 증가">+</button>
                            </div>
                        </div>

                        <label class="order-field order-trade-section">
                            <span>총 주문 금액</span>
                            <div class="order-total-wrap">
                                <input id="orderTotalInput" type="text" placeholder="자동 계산" readonly>
                            </div>
                        </label>

                        <div id="orderHoldingRow" class="order-field order-trade-section hidden">
                            <span>매도 가능</span>
                            <div class="order-holding-summary" aria-label="보유 종목 매도 가능 정보">
                                <div>
                                    <span>현재가</span>
                                    <input id="orderHoldingPrice" type="text" placeholder="조회 중..." readonly>
                                </div>
                                <div>
                                    <span>보유수량</span>
                                    <input id="orderHoldingQuantity" type="text" placeholder="조회 중..." readonly>
                                </div>
                            </div>
                        </div>

                        <div class="order-field order-trade-section">
                            <span>주문 가능 금액</span>
                            <div class="order-total-wrap">
                                <input id="orderAvailableAmount" type="text" placeholder="조회 중..." readonly>
                            </div>
                        </div>

                        <button id="orderSubmitButton" type="submit" class="order-submit-button order-trade-section">매수 주문하기</button>
                        <div id="pendingOrdersPanel" class="pending-orders-panel hidden">
                            <div id="pendingOrdersList" class="pending-orders-list"></div>
                        </div>
                        <p id="orderMessage" class="order-message" aria-live="polite"></p>
                    </form>
                </div>
            </div>

        </aside>

    </div>

    <script type="module" src="js/authModal.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
